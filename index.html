<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PEA Service 888</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI','Noto Sans Thai',Tahoma,sans-serif;background:#F7F8FA;color:#1A1D23;font-size:14px}
:root{--brand:#5B2D8E;--brandL:#7B4DB8;--brandBg:#F3EEF9;--accent:#E8A020;--pass:#1A8A4A;--passBg:#E8F7EE;--fail:#C0392B;--failBg:#FDECEA;--warn:#D97706;--bg:#F7F8FA;--panel:#fff;--border:#E2E5EA;--muted:#6B7280}

/* ── Header ── */
#app-header{background:var(--brand);position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(91,45,142,.3)}
.header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;gap:12;padding:11px 16px}
.pea-badge{background:#fff;border-radius:7px;padding:4px 9px;font-weight:900;font-size:15px;color:var(--brand);letter-spacing:1px}
.header-title{color:#fff;font-weight:700;font-size:15px;line-height:1.2}
.header-sub{color:rgba(255,255,255,.7);font-size:10px}
.step-counter{margin-left:auto;background:var(--accent);color:#fff;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700;white-space:nowrap}

/* ── Step rail ── */
#step-rail{background:#fff;border-bottom:1px solid var(--border);overflow-x:auto}
.rail-inner{max-width:720px;margin:0 auto;display:flex}
.rail-btn{flex:1;min-width:68px;padding:9px 3px;border:none;cursor:pointer;background:transparent;border-bottom:3px solid transparent;color:var(--muted);font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .15s;font-size:10px;font-weight:500}
.rail-btn.active{border-bottom-color:var(--brand);color:var(--brand);font-weight:700}
.rail-btn .ico{font-size:18px}
.rail-btn.active .ico{font-size:20px}

/* ── Content ── */
#content{max-width:720px;margin:0 auto;padding:18px 14px 100px}
.panel{background:#fff;border-radius:13px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:14px}

/* ── Section heading ── */
.sec-title{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.sec-bar{width:4px;height:20px;border-radius:2px;background:var(--brand);flex-shrink:0}
.sec-label{font-weight:700;font-size:14px}

/* ── Form controls ── */
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#1A1D23;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--brand)}
.field select{appearance:none;cursor:pointer}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 10px}

/* ── Pass/Fail buttons ── */
.pf-group{display:flex;gap:6px;flex-wrap:wrap}
.pf-btn{padding:6px 13px;border-radius:6px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:var(--muted);transition:all .15s;font-family:inherit}
.pf-btn.pass{border-color:var(--pass);background:var(--passBg);color:var(--pass)}
.pf-btn.fail{border-color:var(--fail);background:var(--failBg);color:var(--fail)}
.pf-btn.warn{border-color:var(--warn);background:#FEF3DC;color:var(--warn)}

/* ── Check item ── */
.check-item{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)}
.chk-box{width:21px;height:21px;border-radius:5px;border:2px solid var(--border);background:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;margin-top:1px;transition:all .15s}
.chk-box.on{border-color:var(--brand);background:var(--brand)}

/* ── Measurement table ── */
.meas-table{width:100%;border-collapse:collapse;font-size:12px;overflow-x:auto;display:block}
.meas-table th{background:var(--brandBg);padding:7px 10px;color:var(--brand);font-weight:700;border:1px solid #ddd;text-align:center}
.meas-table td{padding:5px 8px;border:1px solid #eee;text-align:center}
.meas-table tr:nth-child(even) td{background:#FAFBFC}
.meas-table input{width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;text-align:center;font-family:inherit}

/* ── Photo upload ── */
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.photo-box{border:2px dashed var(--border);border-radius:8px;padding:20px 10px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;background:#FAFBFC;transition:all .15s;text-align:center}
.photo-box:hover{border-color:var(--brand);background:var(--brandBg)}
.photo-box img{width:100%;height:90px;object-fit:cover;border-radius:6px;border:2px solid var(--brand)}
.photo-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}

/* ── Voltage row ── */
.v-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.v-phase{min-width:45px;font-size:13px;font-weight:600;color:var(--brand)}
.v-row input{flex:1;padding:6px 9px;border:1px solid var(--border);border-radius:6px;font-size:13px;text-align:center;font-family:inherit}
.v-unit{font-size:11px;color:var(--muted);min-width:14px}

/* ── Signature pad ── */
.sig-wrap{border:2px solid var(--border);border-radius:8px;background:#FAFBFC;position:relative;overflow:hidden}
.sig-wrap canvas{display:block;width:100%;height:90px;cursor:crosshair}
.sig-clear{position:absolute;top:5px;right:5px;background:#fff;border:1px solid var(--border);border-radius:5px;padding:2px 8px;cursor:pointer;font-size:11px;color:var(--muted);font-family:inherit}

/* ── Bottom nav ── */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:11px 14px;display:flex;gap:9px;z-index:100}
.nav-inner{max-width:720px;margin:0 auto;display:flex;gap:9px;width:100%}
.btn-back{flex:1;padding:11px 0;border:2px solid var(--border);border-radius:9px;background:#fff;color:#1A1D23;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-next{flex:2;padding:11px 0;border:none;border-radius:9px;background:var(--brand);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-submit{flex:1;padding:12px 0;border:none;border-radius:9px;background:var(--pass);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-preview{flex:1;padding:12px 0;border:2px solid var(--brand);border-radius:9px;background:#fff;color:var(--brand);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* ── Cap table ── */
.cap-table{width:100%;border-collapse:collapse;font-size:11px}
.cap-table th{background:#E0F2F7;padding:6px 7px;color:#0E7490;font-weight:700;border:1px solid #ccc;text-align:center}
.cap-table td{padding:4px 5px;border:1px solid #eee;text-align:center}
.cap-table tr:nth-child(even) td{background:#F0FBFD}
.cap-table input{width:100%;padding:3px 5px;border:1px solid var(--border);border-radius:4px;font-size:11px;text-align:center;font-family:inherit}
.pf-sm{padding:2px 6px;border-radius:4px;border:1px solid var(--border);font-size:10px;font-weight:700;cursor:pointer;background:#fff;color:var(--muted);font-family:inherit}
.pf-sm.p{border-color:var(--pass);background:var(--passBg);color:var(--pass)}
.pf-sm.f{border-color:var(--fail);background:var(--failBg);color:var(--fail)}

/* ── PDF Modal ── */
#pdf-modal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);overflow-y:auto;padding:20px 10px}
#pdf-modal.open{display:block}
.modal-toolbar{position:sticky;top:0;z-index:10;background:#1A1D23;padding:10px 16px;display:flex;align-items:center;gap:10px;border-radius:10px;margin-bottom:12px;max-width:820px;margin-left:auto;margin-right:auto}
.modal-toolbar h3{color:#fff;font-size:14px;font-weight:700;flex:1}
.btn-dl{padding:9px 20px;background:var(--brand);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px}
.btn-close-modal{padding:9px 14px;background:#374151;color:#fff;border:none;border-radius:7px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-dl:disabled{opacity:.6;cursor:not-allowed}

/* ── PDF Document (inside modal + print) ── */
#pdf-doc{background:#fff;max-width:794px;margin:0 auto;padding:24px 28px;font-family:'Segoe UI','Noto Sans Thai',sans-serif;color:#111;font-size:10px;line-height:1.5}
.pdf-header{display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--brand);padding-bottom:10px;margin-bottom:14px}
.pdf-badge{background:var(--brand);color:#fff;border-radius:7px;padding:5px 11px;font-weight:900;font-size:18px;letter-spacing:1px}
.pdf-title{font-size:16px;font-weight:800;color:var(--brand)}
.pdf-sub{font-size:10px;color:#6b7280}
.pdf-sec{margin-bottom:12px;page-break-inside:avoid}
.pdf-sec-hd{background:var(--brand);color:#fff;padding:4px 9px;font-size:11px;font-weight:700;border-radius:4px 4px 0 0}
.pdf-sec-hd.teal{background:#0E7490}
.pdf-sec-body{border:1px solid #e5e7eb;border-top:none;padding:8px 10px;border-radius:0 0 4px 4px}
.pdf-grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 20px}
.pdf-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 12px}
.pdf-row{display:flex;border-bottom:1px solid #f3f4f6;padding:3px 0;gap:6px}
.pdf-row .lbl{min-width:160px;font-size:10px;color:#6b7280;font-weight:600}
.pdf-row .val{flex:1;font-size:10px;color:#111}
.pdf-row .unt{font-size:10px;color:#9ca3af}
.pdf-table{width:100%;border-collapse:collapse;font-size:9.5px;margin-bottom:6px}
.pdf-table th{background:#ede9f7;padding:5px 7px;border:1px solid #d1d5db;color:var(--brand);font-weight:700;text-align:center}
.pdf-table.teal th{background:#e0f2f7;color:#0E7490}
.pdf-table td{padding:3px 7px;border:1px solid #e5e7eb;text-align:center}
.pdf-table tr:nth-child(even) td{background:#fafafa}
.pdf-pass{color:#1a8a4a;font-weight:700}
.pdf-fail{color:#c0392b;font-weight:700}
.pdf-warn{color:#d97706;font-weight:700}
.pdf-photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.pdf-photo-grid img{width:100%;height:70px;object-fit:cover;border-radius:4px;border:1px solid #e5e7eb}
.pdf-photo-cap{font-size:8px;color:#6b7280;text-align:center;margin-top:2px;line-height:1.2}
.sig-box{text-align:center;border:1px solid #e5e7eb;border-radius:6px;padding:8px;min-height:100px}
.sig-box img{max-height:50px;max-width:100%;object-fit:contain;display:block;margin:0 auto 4px}
.sig-line{height:40px;border-bottom:1px solid #9ca3af;margin-bottom:4px}
.pdf-footer{text-align:center;font-size:8px;color:#9ca3af;border-top:1px solid #e5e7eb;padding-top:6px;margin-top:8px}
.pdf-chk-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.pdf-chk{display:flex;gap:5px;align-items:center;padding:2px 0;border-bottom:1px solid #f9fafb;font-size:9.5px}

@media print{
  /* ซ่อนทุกอย่าง */
  #app-header,#step-rail,#content,#bottom-nav,#pdf-modal{display:none!important}
  body{background:#fff!important;margin:0;padding:0}
  /* แสดงเฉพาะ pdf-doc */
  #pdf-doc{
    display:block!important;
    position:static!important;
    left:auto!important;
    top:auto!important;
    width:100%!important;
    opacity:1!important;
    overflow:visible!important;
    padding:10mm 12mm!important;
    font-size:9pt!important;
  }
}
@media screen{
  #pdf-doc{display:none}
}
</style>
</head>
<body>

<!-- ═══════════════════ APP HEADER ═══════════════════ -->
<div id="app-header">
  <div class="header-inner">
    <div class="pea-badge">PEA</div>
    <div>
      <div class="header-title">PEA Service 888</div>
      <div class="header-sub">Provincial Electricity Authority – Field Inspection</div>
    </div>
    <div class="step-counter" id="step-counter">1/6</div>
  </div>
</div>

<!-- ═══════════════════ STEP RAIL ═══════════════════ -->
<div id="step-rail">
  <div class="rail-inner" id="rail"></div>
</div>

<!-- ═══════════════════ CONTENT ═══════════════════ -->
<div id="content"></div>

<!-- ═══════════════════ BOTTOM NAV ═══════════════════ -->
<div id="bottom-nav">
  <div class="nav-inner" id="nav-btns"></div>
</div>

<!-- PDF render container - hidden on screen, shown only on print -->
<div id="pdf-doc"></div>

<!-- ═══════════════════ PDF MODAL ═══════════════════ -->
<div id="pdf-modal">
  <div class="modal-toolbar">
    <h3>🗒️ ตัวอย่างรายงาน PDF</h3>
    <button class="btn-dl" id="btn-dl-pdf" onclick="exportPDF()">⬇ Export PDF</button>
    <button class="btn-close-modal" onclick="closePDFModal()">✕ ปิด</button>
  </div>
  <div id="pdf-preview"></div>
</div>

<script>
// ════════════════════════════════════════════════════
// DATA MODEL
// ════════════════════════════════════════════════════
const thaiDate = () => new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});

const D = {
  step: 1,
  info: { customer:'', site:'', location:'', device:'', engineer:'', date:'', workOrder:'', jobType:'' },
  voltBefore:{},voltAfter:{},phaseBefore:['','',''],phaseAfter:['','',''],
  photos:{},
  meas:{ insul:{}, contact:{}, mdbInsul:{}, cable:{}, earthing:{} },
  cap:{
    capMfg:'',capType:'',capKvar:'',capYear:'',capFreq:'',capVolt:'',capCurr:'',capReact:'',capCap:'',
    magMfg:'',magType:'',fuseMfg:'',fuseType:'',
    pfcMfg:'',pfcType:'',pfcSerial:'',pfcFreq:'',pfcVolt:'',pfcCt:'',pfcPf:'',
    visChecks:[false,false,false,false,false],visRemarks:['','','','',''],
    measStatus:'',
    steps: Array.from({length:12},()=>({ab:'',bc:'',ca:'',exp:'',fuseP:false,fuseF:false,magP:false,magF:false,rem:''}))
  },
  tr:{
    mfg:'',serial:'',power:'',freq:'',hvV:'',lvV:'',vector:'',
    checks: Array(8).fill(0).map(()=>({on:false,rem:''})),
    oil: {t1:'',t2:'',t3:'',t4:'',t5:'',t6:'',status:''}
  },
  signs:{ testName:'',checkedName:'',witnessName:'', testSig:null,checkedSig:null,witnessSig:null }
};

const STEPS = [
  {id:1,label:'ข้อมูลเบื้องต้น',icon:'📋'},
  {id:2,label:'วัดแรงดัน/เฟส',icon:'⚡'},
  {id:3,label:'ภาพปฏิบัติงาน',icon:'📷'},
  {id:4,label:'ค่าวัดต่างๆ',icon:'🔬'},
  {id:5,label:'หม้อแปลง',icon:'🔧'},
  {id:6,label:'ลงนาม',icon:'✍️'},
];
const V_PHASES = ['A-B','B-C','C-A','A-N','B-N','C-N'];
const INSUL_ROWS = ['HV to GND','LV to GND','HV to LV'];
const INSUL_VOLTS = ['2,500','500','2,500'];
const CONTACT_ROWS = ['A - a','B - b','C - c'];
const MDB_ROWS = ['Phase A to G','Phase B to G','Phase C to G','Phase A to B','Phase B to C','Phase C to A'];
const CABLE_ROWS = ['Phase A to G','Phase B to G','Phase C to G'];
const EARTH_ROWS = ['Transformer / High Voltage','Meter','Low Voltage'];
const TR_CHECKS = ['Cleaning and tightening','Bushing undamaged and clean','Connection Check','Oil level check','Oil drain valve check','Dehydrating breather (Silica Gel)','High Voltage Fuse','Low Voltage Fuse'];
const PHOTO_LABELS = ['ชี้แจงรายละเอียดงาน','ปลด Drop Out Fuse','ตรวจสอบ Drop Out Fuse','ระดับน้ำมันหม้อแปลง','ถอดจุดต่อสาย HV/LV Bushing','ขัดทำความสะอาด HV/LV Bushing','กวดขัน HV Bushing','กวดขัน LV Bushing','ดูดฝุ่น MDB ก่อน','ดูดฝุ่น MDB หลัง','สับ Drop Out Fuse จ่ายไฟคืน','Transformer Name Plate'];

// ════════════════════════════════════════════════════
// RENDER HELPERS
// ════════════════════════════════════════════════════
const h = (tag, attrs='', inner='') => `<${tag} ${attrs}>${inner}</${tag}>`;
const field = (label, inner) => `<div class="field"><label>${label}</label>${inner}</div>`;
const inp = (id,val='',ph='',type='text') => `<input type="${type}" id="${id}" value="${esc(val)}" placeholder="${ph}" oninput="save('${id}',this.value)">`;
const sel = (id,val,opts) => `<select id="${id}" onchange="save('${id}',this.value)">${opts.map(o=>`<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}</select>`;
const esc = s => (s||'').toString().replace(/"/g,'&quot;').replace(/</g,'&lt;');
const sec = (title,body,color='') => `<div class="sec-title"><div class="sec-bar" style="${color?'background:'+color:''}"></div><span class="sec-label">${title}</span></div>${body}`;

function pfGroup(id, val, opts=['Pass','Fail','N/A']) {
  return `<div class="pf-group">${opts.map(o=>{
    let cls='pf-btn'; if(val===o) cls+= o==='Pass'?' pass':o==='Fail'?' fail':' warn';
    return `<button class="${cls}" onclick="savePF('${id}','${o}')">${o==='Pass'?'✓ Pass':o==='Fail'?'✗ Fail':o}</button>`;
  }).join('')}</div>`;
}

// ════════════════════════════════════════════════════
// SAVE HELPERS
// ════════════════════════════════════════════════════
function save(id, val) {
  const path = id.split('__');
  if (path[0]==='info') D.info[path[1]] = val;
  else if (path[0]==='vb') D.voltBefore[path[1]] = val;
  else if (path[0]==='va') D.voltAfter[path[1]] = val;
  else if (path[0]==='pb') D.phaseBefore[+path[1]] = val;
  else if (path[0]==='pa') D.phaseAfter[+path[1]] = val;
  else if (path[0]==='mi') { const k=path[1]; if(!D.meas.insul[k]) D.meas.insul[k]=''; D.meas.insul[k]=val; }
  else if (path[0]==='mc') { D.meas.contact[path[1]]=val; }
  else if (path[0]==='mm') { D.meas.mdbInsul[path[1]]=val; }
  else if (path[0]==='mca') { D.meas.cable[path[1]]=val; }
  else if (path[0]==='me') { D.meas.earthing[path[1]]=val; }
  else if (path[0]==='cap') { D.cap[path[1]]=val; }
  else if (path[0]==='capstep') { D.cap.steps[+path[1]][path[2]]=val; }
  else if (path[0]==='capvis') { D.cap.visRemarks[+path[1]]=val; }
  else if (path[0]==='tr') { D.tr[path[1]]=val; }
  else if (path[0]==='trck') { D.tr.checks[+path[1]].rem=val; }
  else if (path[0]==='troil') { D.tr.oil[path[1]]=val; }
  else if (path[0]==='sg') { D.signs[path[1]]=val; }
}
function savePF(id, val) { save(id,val); render(); }
function toggleCheck(type, idx) {
  if(type==='tr') D.tr.checks[idx].on = !D.tr.checks[idx].on;
  else if(type==='capvis') D.cap.visChecks[idx] = !D.cap.visChecks[idx];
  render();
}
function toggleCapStep(idx, field) {
  const s = D.cap.steps[idx];
  if(field==='fuseP'){ s.fuseP=!s.fuseP; if(s.fuseP) s.fuseF=false; }
  else if(field==='fuseF'){ s.fuseF=!s.fuseF; if(s.fuseF) s.fuseP=false; }
  else if(field==='magP'){ s.magP=!s.magP; if(s.magP) s.magF=false; }
  else if(field==='magF'){ s.magF=!s.magF; if(s.magF) s.magP=false; }
  render();
}

// ════════════════════════════════════════════════════
// PHOTO UPLOAD
// ════════════════════════════════════════════════════
function triggerPhoto(label) {
  const fi = document.createElement('input');
  fi.type='file'; fi.accept='image/*';
  fi.onchange = e => {
    const file = e.target.files[0]; if(!file) return;
    const r = new FileReader();
    r.onload = ev => { D.photos[label]={url:ev.target.result,name:file.name}; render(); };
    r.readAsDataURL(file);
  };
  fi.click();
}
function removePhoto(label) { D.photos[label]=null; render(); }

// ════════════════════════════════════════════════════
// SIGNATURE PADS
// ════════════════════════════════════════════════════
const sigState = {};
function initSig(id) {
  const canvas = document.getElementById(id);
  if(!canvas || sigState[id+'_init']) return;
  sigState[id+'_init']=true;
  let drawing=false, last=null;
  const pos = e => { const r=canvas.getBoundingClientRect(); const s=e.touches?e.touches[0]:e; return {x:(s.clientX-r.left)*(canvas.width/r.width),y:(s.clientY-r.top)*(canvas.height/r.height)}; };
  const start = e => { e.preventDefault(); drawing=true; last=pos(e); };
  const draw = e => {
    e.preventDefault(); if(!drawing) return;
    const p=pos(e), ctx=canvas.getContext('2d');
    ctx.strokeStyle='#5B2D8E'; ctx.lineWidth=2; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke();
    last=p;
  };
  const end = e => { e.preventDefault(); drawing=false; saveSig(id); };
  canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',draw);
  canvas.addEventListener('mouseup',end); canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',draw,{passive:false});
  canvas.addEventListener('touchend',end);
}
function saveSig(id) {
  const canvas = document.getElementById(id);
  if(!canvas) return;
  const key = id==='sig-test'?'testSig':id==='sig-check'?'checkedSig':'witnessSig';
  D.signs[key] = canvas.toDataURL();
}
function clearSig(id) {
  const canvas = document.getElementById(id);
  if(!canvas) return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
  const key = id==='sig-test'?'testSig':id==='sig-check'?'checkedSig':'witnessSig';
  D.signs[key]=null;
}
function afterRender() {
  ['sig-test','sig-check','sig-witness'].forEach(id => {
    setTimeout(() => initSig(id), 50);
  });
}

// ════════════════════════════════════════════════════
// PDF MODAL
// ════════════════════════════════════════════════════
function openPDFModal() {
  const html = buildPDFDoc();
  // Put in off-screen render div
  document.getElementById('pdf-doc').innerHTML = html;
  // Also put in visible preview div inside modal
  document.getElementById('pdf-preview').innerHTML = `<div class="pdf-doc-inner" style="background:#fff;max-width:794px;margin:0 auto;padding:24px 28px;font-family:'Segoe UI','Noto Sans Thai',sans-serif;color:#111;font-size:10px;line-height:1.5">${html}</div>`;
  document.getElementById('pdf-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closePDFModal() {
  document.getElementById('pdf-modal').classList.remove('open');
  document.body.style.overflow='';
}

async function renderAndExportPDF(callerBtnId) {
  const callerBtn = callerBtnId ? document.getElementById(callerBtnId) : null;
  const modalBtn  = document.getElementById('btn-dl-pdf');
  const setLoading = on => {
    if(callerBtn) { callerBtn.disabled = on; callerBtn.textContent = on ? '⏳ กำลังเตรียม...' : '💾 บันทึก & Export PDF'; }
    if(modalBtn)  { modalBtn.disabled  = on; modalBtn.innerHTML   = on ? '⏳ กำลังเตรียม...' : '⬇ Export PDF'; }
  };
  setLoading(true);

  // Build PDF content into the print-only div
  document.getElementById('pdf-doc').innerHTML = buildPDFDoc();

  // Short delay for render
  await new Promise(r => setTimeout(r, 300));

  // Print (user selects "Save as PDF" in print dialog)
  window.print();

  setLoading(false);
}

// Called from modal "Export PDF" button
async function exportPDF() {
  await renderAndExportPDF('btn-dl-pdf');
}

// Called from Step-6 bottom nav
async function submitAndExport() {
  await renderAndExportPDF('btn-submit-export');
}

// ════════════════════════════════════════════════════
// MAIN RENDER
// ════════════════════════════════════════════════════
function render() {
  // Rail
  document.getElementById('rail').innerHTML = STEPS.map(s =>
    `<button class="rail-btn ${D.step===s.id?'active':''}" onclick="goStep(${s.id})">
      <span class="ico">${s.icon}</span>${s.label}
    </button>`).join('');
  document.getElementById('step-counter').textContent = `${D.step}/${STEPS.length}`;

  // Content
  const renders = [null,renderStep1,renderStep2,renderStep3,renderStep4,renderStep5,renderStep6];
  document.getElementById('content').innerHTML = renders[D.step]();

  // Nav
  const nav = document.getElementById('nav-btns');
  let html = '';
  if(D.step > 1) html += `<button class="btn-back" onclick="goStep(${D.step-1})">← ย้อนกลับ</button>`;
  if(D.step < 6)  html += `<button class="btn-next" onclick="goStep(${D.step+1})">ถัดไป →</button>`;
  if(D.step === 6) {
    html += `<button class="btn-preview" onclick="openPDFModal()">👁 ดูตัวอย่าง</button>`;
    html += `<button class="btn-submit" id="btn-submit-export" onclick="submitAndExport()">💾 บันทึก &amp; Export PDF</button>`;
  }
  nav.innerHTML = html;

  afterRender();
}

function goStep(n) {
  D.step = n;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// Keyboard close modal
document.addEventListener('keydown', e => { if(e.key==='Escape') closePDFModal(); });

// Init — wait for DOM ready
document.addEventListener('DOMContentLoaded', function() {
  render();
});
</script>
